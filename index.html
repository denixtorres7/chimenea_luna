<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;

background:transparent;
touch-action:none;
}

#escena{

position:relative;

width:1728px;
height:1117px;

overflow:hidden;

}


/* juguetes */

.juguete{

position:absolute;

cursor:grab;

touch-action:none;

user-select:none;
-webkit-user-select:none;
-webkit-user-drag:none;

transition:
transform .15s;

}

.juguete:active{

transform:scale(1.08);

cursor:grabbing;

}


/* posiciones */

#raton{

left:170px;
top:860px;

width:160px;

}

#madeja{

left:380px;
top:910px;

width:80px;

}

#pina{

left:420px;
top:800px;

width:70px;

}

</style>
</head>

<body>

<div id="escena">

<img
id="raton"
class="juguete"
src="raton.png">


<img
id="madeja"
class="juguete"
src="madeja.png">


<img
id="pina"
class="juguete"
src="pina.png">

</div>


<script>

let activo=null;

let offsetX=0;
let offsetY=0;


document
.querySelectorAll(".juguete")
.forEach(el=>{

el.addEventListener(
"pointerdown",
iniciar
);

});


function iniciar(e){

e.preventDefault();

activo=e.currentTarget;

activo.style.zIndex=999;

offsetX=
e.clientX-
activo.offsetLeft;

offsetY=
e.clientY-
activo.offsetTop;

}


document.addEventListener(
"pointermove",
mover
);


function mover(e){

if(!activo)return;

activo.style.left=
(e.clientX-offsetX)
+"px";

activo.style.top=
(e.clientY-offsetY)
+"px";

}


document.addEventListener(
"pointerup",
soltar
);

document.addEventListener(
"pointercancel",
soltar
);

document.addEventListener(
"mouseleave",
soltar
);


function soltar(){

activo=null;

}

</script>

</body>
</html>
